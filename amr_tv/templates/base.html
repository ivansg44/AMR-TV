{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta http-equiv="x-ua-compatible" content="ie=edge">

    {% block css %}
    <link rel="stylesheet" href="{% static "base.css" %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    {% endblock %}

    <title>{% block title %}AMR-TV{% endblock title %}</title>
  </head>

  <body>
    <div class="container-fluid m-1">
      <div class="row">
        <div class="col-2">
          <div class="input-group">
            <div class="input-group-prepend">
              <div class="input-group-text">Start</div>
            </div>
            <input id="start-date-input" type="date" class="form-control" value="2020-10-01" min="2010-12-15" max="2020-10-31">
          </div>
        </div>
        <div class="col-2">
          <div class="input-group">
            <div class="input-group-prepend">
              <div class="input-group-text">End</div>
            </div>
            <input id="end-date-input" type="date" class="form-control" value="2020-10-31" min="2010-12-15" max="2020-10-31">
          </div>
        </div>
        <div class="col-2">
          <button id="adjacency-matrix-create-btn" type="button" class="btn btn-primary">
            <i class="fa fa-refresh"></i>
          </button>
        </div>
      </div>
      <div class="row">
        <div class="col-6">
          <div id="adjacency-matrix-plot"></div>
        </div>
        <div class="col-1 align-self-center" align="center">
          <button id="node-link-diagram-create-btn" type="button" class="btn btn-primary">
            <i class="fa fa-arrow-right"></i>
          </button>
        </div>
        <div class="col-4 align-self-center col-offset-1">
          <div id="node-link-diagram-plot"></div>
        </div>
      </div>
      <div class="row">
        <div class="col">
          <div>
            <b>organism_group:</b>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col">
          <div id="node-detail-organism-group"></div>
        </div>
      </div>
      <div class="row">
        <div class="col">
          <div>
            <b>amr_genotypes:</b>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col">
          <div id="node-detail-amr-genotypes"></div>
        </div>
      </div>
      <div class="row">
        <div class="col">
          <div id="node-detail-table-plot"></div>
        </div>
      </div>
    </div>

    {% block javascript %}
    <script src="https://code.jquery.com/jquery-3.5.1.min.js" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
    <script src="{% static 'base.js' %}"></script>
    <script src="{% static 'organism_groups.js' %}"></script>
    {% endblock javascript %}
  </body>
</html>
